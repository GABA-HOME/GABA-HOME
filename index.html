<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --paper:#F3EEE2;
  --paper-line: rgba(47,93,115,0.08);
  --ink:#1B2420;
  --ink-soft:#5B6660;
  --navy:#16232B;
  --navy-line: rgba(120,190,210,0.14);
  --blue:#2F5D73;
  --blue-soft:#DCE7EA;
  --brick:#A64B2A;
  --brick-soft:#F1DFD5;
  --ochre:#B5842A;
  --ochre-soft:#F3E7D0;
  --moss:#4F7A52;
  --moss-soft:#DEE8DD;
  --card:#FBF9F3;
  --border:#DCD4C0;
  --radius:10px;
}

*{box-sizing:border-box;}
body{margin:0;padding:0;}
#gaba-root{
  --fs-mult:1;
  font-family:'Inter',sans-serif;
  color:var(--ink);
  background:
    linear-gradient(var(--paper-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--paper-line) 1px, transparent 1px),
    var(--paper);
  background-size:26px 26px;
  min-height:640px;
  display:flex;
  border-radius:14px;
  overflow:hidden;
  border:1px solid var(--border);
}

/* ---------- Sidebar ---------- */
.gh-sidebar{
  width:198px;
  flex-shrink:0;
  background:
    linear-gradient(var(--navy-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--navy-line) 1px, transparent 1px),
    var(--navy);
  background-size:18px 18px;
  color:#EDEFEA;
  padding:22px 16px;
  display:flex;
  flex-direction:column;
  gap:26px;
}
.gh-logo{display:flex; align-items:center; gap:9px;}
.gh-logo svg{flex-shrink:0;}
.gh-logo-text{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:calc(15px * var(--fs-mult,1)); letter-spacing:0.5px; line-height:1.15;}
.gh-logo-text span{display:block; font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:calc(9.5px * var(--fs-mult,1)); color:#8FB4C2; letter-spacing:1.5px; margin-top:2px;}

.gh-nav{display:flex; flex-direction:column; gap:3px;}
.gh-nav-item{
  display:flex; align-items:center; gap:9px;
  padding:9px 10px; border-radius:7px;
  font-size:calc(13px * var(--fs-mult,1)); font-weight:500; color:#C7D0CC;
  cursor:pointer; border:none; background:transparent; text-align:left; width:100%;
  font-family:'Inter',sans-serif;
  transition:background .12s ease, color .12s ease;
}
.gh-nav-item:hover{background:rgba(255,255,255,0.06); color:#fff;}
.gh-nav-item.active{background:var(--blue); color:#fff;}
.gh-nav-item svg{flex-shrink:0; opacity:.9;}

.gh-sidebar-foot{margin-top:auto; font-family:'IBM Plex Mono',monospace; font-size:calc(10px * var(--fs-mult,1)); color:#6E8790; line-height:1.5;}

/* ---------- Main ---------- */
.gh-main{flex:1; padding:26px 30px; overflow-y:auto; max-height:900px;}
.gh-topbar{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:22px;}
.gh-title{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:calc(22px * var(--fs-mult,1)); margin:0;}
.gh-subtitle{font-family:'IBM Plex Mono',monospace; font-size:calc(11.5px * var(--fs-mult,1)); color:var(--ink-soft); margin-top:4px; text-transform:uppercase; letter-spacing:.5px;}

.gh-btn{
  font-family:'Inter',sans-serif; font-weight:600; font-size:calc(13px * var(--fs-mult,1));
  background:var(--brick); color:#fff; border:none; border-radius:7px;
  padding:9px 16px; cursor:pointer; display:inline-flex; align-items:center; gap:7px;
  transition:filter .12s ease;
}
.gh-btn:hover{filter:brightness(1.08);}
.gh-btn.secondary{background:transparent; color:var(--ink); border:1.4px solid var(--border);}
.gh-btn.small{padding:5px 10px; font-size:calc(11.5px * var(--fs-mult,1)); border-radius:6px;}
.gh-btn.ghost{background:transparent; color:var(--ink-soft); padding:5px 8px;}

/* Stat cards */
.gh-stats{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:26px;}
.gh-stat{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px 16px 14px; position:relative;
}
.gh-stat-num{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:calc(28px * var(--fs-mult,1)); line-height:1;}
.gh-stat-label{font-size:calc(11.5px * var(--fs-mult,1)); color:var(--ink-soft); margin-top:6px; font-weight:500;}
.gh-stat-pin{
  position:absolute; top:12px; right:12px; width:20px; height:20px; border-radius:50%;
  border:1.6px solid var(--ink-soft); display:flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono',monospace; font-size:calc(9px * var(--fs-mult,1)); color:var(--ink-soft);
}

.gh-section{margin-bottom:28px;}
.gh-section-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
.gh-section-title{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:calc(15.5px * var(--fs-mult,1));}

/* Stamp signature */
.gh-stamp{
  display:inline-block; padding:3px 11px; border:2.5px double currentColor; border-radius:5px;
  font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:calc(10px * var(--fs-mult,1)); letter-spacing:1px;
  text-transform:uppercase; white-space:nowrap;
}
.gh-stamp.pendiente{color:var(--ochre); transform:rotate(-4deg);}
.gh-stamp.en_presupuesto{color:#8A5D18; transform:rotate(-2deg);}
.gh-stamp.gestoria{color:#5C4A8A; transform:rotate(-5deg);}
.gh-stamp.en_proceso{color:var(--blue); transform:rotate(-3deg);}
.gh-stamp.terminado{color:var(--moss); transform:rotate(-5deg);}

.gh-tag{
  display:inline-block; font-size:calc(10.5px * var(--fs-mult,1)); font-weight:600; padding:3px 9px; border-radius:20px;
  font-family:'IBM Plex Mono',monospace; letter-spacing:.3px;
}

/* Job card */
.gh-job{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:15px 16px; margin-bottom:10px; display:flex; flex-direction:column; gap:9px;
}
.gh-job-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.gh-job-title{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:calc(15px * var(--fs-mult,1));}
.gh-job-meta{font-size:calc(12px * var(--fs-mult,1)); color:var(--ink-soft); margin-top:2px;}
.gh-progress-track{background:var(--border); height:6px; border-radius:4px; overflow:hidden;}
.gh-progress-fill{height:100%; background:var(--blue); border-radius:4px;}
.gh-job-foot{display:flex; justify-content:space-between; align-items:center; font-size:calc(11.5px * var(--fs-mult,1)); color:var(--ink-soft);}
.gh-job-actions{display:flex; gap:6px;}

/* Appointment row */
.gh-appt{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:12px 16px; display:flex; align-items:center; gap:14px; margin-bottom:9px;
}
.gh-appt-date{
  font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:calc(12px * var(--fs-mult,1)); text-align:center;
  background:var(--blue-soft); color:var(--blue); border-radius:7px; padding:6px 10px; min-width:56px;
}
.gh-appt-badge{
  font-family:'IBM Plex Mono',monospace; font-size:calc(10px * var(--fs-mult,1)); font-weight:600; padding:2px 8px;
  border-radius:20px; text-transform:uppercase; letter-spacing:.4px;
}
.gh-appt-body{flex:1;}
.gh-appt-title{font-weight:600; font-size:calc(13.5px * var(--fs-mult,1));}
.gh-appt-meta{font-size:calc(11.5px * var(--fs-mult,1)); color:var(--ink-soft); margin-top:2px;}

.gh-empty{
  border:1.5px dashed var(--border); border-radius:var(--radius); padding:26px; text-align:center;
  color:var(--ink-soft); font-size:calc(13px * var(--fs-mult,1));
}

.gh-filters{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
.gh-chip{
  font-size:calc(12px * var(--fs-mult,1)); font-weight:500; padding:5px 12px; border-radius:20px; border:1.4px solid var(--border);
  background:transparent; cursor:pointer; color:var(--ink-soft); font-family:'Inter',sans-serif;
}
.gh-chip.active{background:var(--ink); color:#fff; border-color:var(--ink);}

.gh-wa-btn{
  background:#EAF5EE; color:#2E7D4F; border:1px solid #C9E6D3;
  font-family:'Inter',sans-serif; font-weight:600; font-size:calc(11.5px * var(--fs-mult,1)); border-radius:6px;
  padding:5px 10px; cursor:pointer; display:inline-flex; align-items:center; gap:5px;
}
.gh-wa-btn:hover{filter:brightness(0.97);}

/* Budget items table */
.gh-item-row{display:grid; grid-template-columns:1fr 90px 30px; gap:8px; margin-bottom:7px; align-items:center;}
.gh-item-remove{background:transparent; border:none; color:var(--brick); cursor:pointer; font-size:calc(16px * var(--fs-mult,1)); line-height:1;}
.gh-budget-total{
  display:flex; justify-content:space-between; align-items:center; padding-top:10px; margin-top:6px;
  border-top:1.4px dashed var(--border); font-family:'IBM Plex Mono',monospace;
}
.gh-budget-total .label{color:var(--ink-soft); font-size:calc(12px * var(--fs-mult,1));}
.gh-budget-total .value{font-weight:700; font-size:calc(16px * var(--fs-mult,1)); color:var(--ink);}
.gh-budget-card{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:15px 16px; margin-bottom:10px;
}
.gh-budget-status{
  font-family:'IBM Plex Mono',monospace; font-size:calc(10px * var(--fs-mult,1)); font-weight:600; padding:3px 9px;
  border-radius:20px; text-transform:uppercase; letter-spacing:.4px;
}

/* Team */
.gh-team-card{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 16px; display:flex; align-items:center; gap:12px; margin-bottom:9px;
}
.gh-avatar{
  width:38px; height:38px; border-radius:50%; background:var(--blue-soft); color:var(--blue);
  display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk',sans-serif;
  font-weight:700; font-size:calc(14px * var(--fs-mult,1)); flex-shrink:0;
}

/* Modal */
.gh-overlay{
  position:fixed; inset:0; background:rgba(22,35,43,0.45); display:flex; align-items:center; justify-content:center;
  z-index:50; padding:20px;
}
.gh-modal{
  background:var(--card); border-radius:14px; padding:24px 26px; width:420px; max-width:100%;
  max-height:85vh; overflow-y:auto; border:1px solid var(--border);
}
.gh-modal-title{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:calc(17px * var(--fs-mult,1)); margin-bottom:16px;}
.gh-field{margin-bottom:13px;}
.gh-label{font-size:calc(12px * var(--fs-mult,1)); font-weight:600; color:var(--ink-soft); margin-bottom:5px; display:block;}
.gh-input, .gh-select, .gh-textarea{
  width:100%; padding:9px 10px; border-radius:7px; border:1.4px solid var(--border);
  font-family:'Inter',sans-serif; font-size:calc(13px * var(--fs-mult,1)); background:#fff; color:var(--ink);
}
.gh-textarea{resize:vertical; min-height:56px;}
.gh-row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.gh-modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:18px;}
.gh-range-val{font-family:'IBM Plex Mono',monospace; font-size:calc(12px * var(--fs-mult,1)); color:var(--blue); font-weight:600;}

@media (max-width:720px){
  #gaba-root{flex-direction:column; --fs-mult:1.2; border-radius:0; min-height:100vh;}
  .gh-sidebar{width:100%; flex-direction:row; align-items:center; padding:12px 14px; gap:10px; overflow-x:auto; -webkit-overflow-scrolling:touch;}
  .gh-nav{flex-direction:row; gap:5px;}
  .gh-nav-item{white-space:nowrap; padding:11px 13px; min-height:42px;}
  .gh-sidebar-foot{display:none;}
  .gh-stats{grid-template-columns:repeat(2,1fr); gap:10px;}
  .gh-main{padding:16px 14px 90px;}
  .gh-row2{grid-template-columns:1fr;}
  .gh-topbar{flex-direction:column; align-items:stretch; gap:12px;}
  .gh-topbar > div:last-child{display:flex; gap:8px;}
  .gh-topbar > div:last-child .gh-btn{flex:1; justify-content:center;}
  .gh-btn{min-height:44px; padding:11px 16px;}
  .gh-btn.small{min-height:38px;}
  .gh-wa-btn{min-height:40px; padding:9px 13px;}
  .gh-input, .gh-select, .gh-textarea{font-size:16px !important; padding:12px;}
  .gh-search-input{font-size:16px !important; padding:13px 14px 13px 40px;}
  .gh-checkbox{width:22px; height:22px;}
  .gh-modal{width:100%; max-width:100%; padding:20px; border-radius:14px 14px 0 0; position:fixed; left:0; right:0; bottom:0; max-height:90vh;}
  .gh-overlay{align-items:flex-end; padding:0;}
  .gh-job-actions{flex-wrap:wrap; gap:6px;}
  .gh-job-foot{flex-direction:column; align-items:flex-start; gap:8px;}
  .gh-appt{flex-wrap:wrap;}
  .gh-appt-body{min-width:140px;}
}

/* Tasks */
.gh-task-row{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:12px 16px; display:flex; align-items:center; gap:12px; margin-bottom:9px;
}
.gh-task-row.done{opacity:.55;}
.gh-checkbox{width:19px; height:19px; accent-color:var(--moss); cursor:pointer; flex-shrink:0;}
.gh-task-title{font-weight:600; font-size:calc(13.5px * var(--fs-mult,1));}
.gh-task-title.done{text-decoration:line-through;}
.gh-task-meta{font-size:calc(11.5px * var(--fs-mult,1)); color:var(--ink-soft); margin-top:2px;}

/* Client cards */
.gh-client-card{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 16px; display:flex; align-items:center; gap:12px; margin-bottom:9px;
}

/* Payments */
.gh-payment-row{display:flex; justify-content:space-between; align-items:center; font-size:calc(12px * var(--fs-mult,1)); padding:4px 0; color:var(--ink-soft);}
.gh-paid-line{display:flex; justify-content:space-between; font-size:calc(12.5px * var(--fs-mult,1)); padding-top:6px; margin-top:4px; border-top:1px dashed var(--border);}

/* Bitácora */
.gh-log-entry{display:flex; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:calc(12.5px * var(--fs-mult,1));}
.gh-log-entry:last-child{border-bottom:none;}
.gh-log-time{font-family:'IBM Plex Mono',monospace; color:var(--ink-soft); font-size:calc(10.5px * var(--fs-mult,1)); white-space:nowrap; padding-top:1px;}

/* Print */
#gh-print-area{display:none;}
@media print{
  #gaba-root{display:none;}
  #gh-print-area{display:block; font-family:'Inter',sans-serif; color:#1B2420; padding:24px;}
  .gh-print-head{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:3px double #16232B; padding-bottom:14px; margin-bottom:18px;}
  .gh-print-title{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:calc(20px * var(--fs-mult,1));}
  .gh-print-table{width:100%; border-collapse:collapse; margin-top:14px;}
  .gh-print-table th{text-align:left; font-size:calc(11px * var(--fs-mult,1)); text-transform:uppercase; letter-spacing:.5px; color:#5B6660; border-bottom:1.5px solid #DCD4C0; padding:6px 4px;}
  .gh-print-table td{padding:8px 4px; border-bottom:1px solid #ECE7DA; font-size:calc(13px * var(--fs-mult,1));}
  .gh-print-total{display:flex; justify-content:flex-end; gap:30px; margin-top:16px; font-family:'IBM Plex Mono',monospace;}
}

/* Global search */
.gh-search-wrap{position:relative; margin-bottom:20px;}
.gh-search-input{
  width:100%; padding:11px 14px 11px 38px; border-radius:9px; border:1.4px solid var(--border);
  font-family:'Inter',sans-serif; font-size:calc(13.5px * var(--fs-mult,1)); background:var(--card); color:var(--ink);
}
.gh-search-icon{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--ink-soft); pointer-events:none;}
.gh-search-result{
  background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px 14px;
  margin-bottom:7px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;
}
.gh-search-result:hover{border-color:var(--blue);}
.gh-search-kind{font-family:'IBM Plex Mono',monospace; font-size:calc(9.5px * var(--fs-mult,1)); text-transform:uppercase; letter-spacing:.5px; color:var(--ink-soft);}

/* Priority & atraso badges */
.gh-priority-urgente, .gh-priority-super_urgente{
  font-family:'IBM Plex Mono',monospace; font-size:calc(10px * var(--fs-mult,1)); font-weight:700; color:#fff; background:#C0392B;
  padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.4px;
}
.gh-priority-alta{
  font-family:'IBM Plex Mono',monospace; font-size:calc(10px * var(--fs-mult,1)); font-weight:700; color:#fff; background:var(--brick);
  padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.4px;
}
.gh-priority-media{
  font-family:'IBM Plex Mono',monospace; font-size:calc(10px * var(--fs-mult,1)); font-weight:600; color:var(--ochre); background:var(--ochre-soft);
  padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.4px;
}
.gh-priority-baja{
  font-family:'IBM Plex Mono',monospace; font-size:calc(10px * var(--fs-mult,1)); font-weight:600; color:var(--moss); background:var(--moss-soft);
  padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.4px;
}
.gh-atraso{
  font-family:'IBM Plex Mono',monospace; font-size:calc(10px * var(--fs-mult,1)); font-weight:700; color:#fff; background:#C0392B;
  padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.4px;
}
.gh-folio{font-family:'IBM Plex Mono',monospace; font-size:calc(10.5px * var(--fs-mult,1)); color:var(--ink-soft); letter-spacing:.3px;}
.gh-maps-link{font-size:calc(11.5px * var(--fs-mult,1)); color:var(--blue); text-decoration:none; display:inline-flex; align-items:center; gap:4px;}
.gh-maps-link:hover{text-decoration:underline;}

/* Checklist */
.gh-check-item{display:flex; align-items:center; gap:9px; padding:5px 0; font-size:calc(13px * var(--fs-mult,1));}
.gh-check-item.done{color:var(--ink-soft); text-decoration:line-through;}

/* Reports */
.gh-report-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); font-size:calc(13px * var(--fs-mult,1));}
.gh-report-row:last-child{border-bottom:none;}

/* Dashboard two-column layout */
.gh-dash-grid{display:grid; grid-template-columns:1fr 340px; gap:24px; align-items:start;}
.gh-dash-side{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px;}
@media (max-width:960px){
  .gh-dash-grid{grid-template-columns:1fr;}
}

/* Gabin assistant card */
.gh-ovo-card{
  background:linear-gradient(135deg, #16232B 0%, #2F5D73 100%); color:#EDEFEA;
  border-radius:var(--radius); padding:18px 20px; margin-bottom:22px;
}
.gh-ovo-head{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
.gh-ovo-name{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:calc(15px * var(--fs-mult,1));}
.gh-ovo-tag{font-family:'IBM Plex Mono',monospace; font-size:calc(9.5px * var(--fs-mult,1)); color:#8FB4C2; text-transform:uppercase; letter-spacing:1px;}
.gh-ovo-body{font-size:calc(13px * var(--fs-mult,1)); line-height:1.6; opacity:.95;}
.gh-ovo-body a, .gh-ovo-link{color:#8FB4C2; cursor:pointer; text-decoration:underline;}
</style>

<div id="gaba-root"></div>
<div id="gh-print-area"></div>

<script>
(function(){

const TYPES = [
  {id:'avaluo', label:'Avalúo'},
  {id:'plano', label:'Plano'},
  {id:'tramite', label:'Trámite'},
  {id:'topografia', label:'Topografía'},
  {id:'agrimensura', label:'Agrimensura'},
  {id:'subdivision', label:'Subdivisión'},
  {id:'levantamiento', label:'Levantamiento'},
  {id:'poligono', label:'Polígono'},
  {id:'otro', label:'Otro'}
];
const TYPE_COLORS = {
  avaluo:{bg:'#F3E7D0',fg:'#8A5D18'}, plano:{bg:'#DCE7EA',fg:'#2F5D73'},
  tramite:{bg:'#F1DFD5',fg:'#A64B2A'}, topografia:{bg:'#DEE8DD',fg:'#4F7A52'},
  agrimensura:{bg:'#E4DEF0',fg:'#5C4A8A'}, subdivision:{bg:'#DDE9F2',fg:'#2C5F7A'},
  levantamiento:{bg:'#E6E9D6',fg:'#5D6B2E'}, poligono:{bg:'#F0DCE4',fg:'#8A3B54'},
  otro:{bg:'#E9E4D8',fg:'#5B6660'}
};
const STATUS = {en_presupuesto:'En presupuesto', pendiente:'Pendiente', gestoria:'En gestoría', en_proceso:'En proceso', terminado:'Terminado'};
const TRAMITOLOGIA = {cliente:'Hecha por el cliente', equipo:'Hecha por nosotros'};
const ROLES = ['Arquitecto/a','Ingeniero/a','Topógrafo/a','Administrativo/a','Otro'];

function fbUrl(key){
  return `https://firestore.googleapis.com/v1/projects/${FB.projectId}/databases/(default)/documents/${FB_COLLECTION}/${key}?key=${FB.apiKey}`;
}

let fbHadError = false;
let pendingSaves = {};
let isOffline = false;

function cacheGet(key){
  try{ const raw = localStorage.getItem('gabahome_cache_'+key); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function cacheSet(key, value){
  try{ localStorage.setItem('gabahome_cache_'+key, JSON.stringify(value)); }
  catch(e){ /* no disponible en este entorno, se ignora */ }
}
let usingCachedData = false;

async function loadKey(key){
  try{
    const res = await fetch(fbUrl(key));
    if(res.status===404){ cacheSet(key, []); return []; }
    if(!res.ok){ console.error('Firestore GET falló', key, res.status, await res.text()); fbHadError = true; return []; }
    const data = await res.json();
    const str = data.fields && data.fields.value && data.fields.value.stringValue;
    const value = str ? JSON.parse(str) : [];
    cacheSet(key, value);
    isOffline = false; usingCachedData = false;
    return value;
  }catch(e){
    console.error('loadKey error (sin conexión, usando copia local)', key, e);
    isOffline = true;
    const cached = cacheGet(key);
    if(cached !== null){ usingCachedData = true; return cached; }
    return [];
  }
}
async function loadObjKey(key){
  const v = await loadKey(key);
  return (v && typeof v==='object' && !Array.isArray(v)) ? v : {};
}
async function saveKey(key, arr){
  cacheSet(key, arr);
  try{
    const body = { fields: { value: { stringValue: JSON.stringify(arr) }, updatedAt: { timestampValue: new Date().toISOString() } } };
    const res = await fetch(fbUrl(key), {
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    if(!res.ok){ console.error('Firestore PATCH falló', key, res.status, await res.text()); fbHadError = true; return; }
    delete pendingSaves[key];
    if(Object.keys(pendingSaves).length===0) isOffline = false;
  }catch(e){
    console.error('saveKey error (sin conexión, se reintentará)', key, e);
    pendingSaves[key] = arr;
    isOffline = true;
    render();
  }
}

async function flushPendingSaves(){
  const keys = Object.keys(pendingSaves);
  for(const key of keys){
    await saveKey(key, pendingSaves[key]);
  }
  render();
}
window.addEventListener('online', flushPendingSaves);
window.ghRetrySave = async function(){
  if(usingCachedData){
    const [jobs, appointments, team, budgets, clients, tasks] = await Promise.all([loadKey('jobs'), loadKey('appointments'), loadKey('team'), loadKey('budgets'), loadKey('clients'), loadKey('tasks')]);
    if(!isOffline){ state.jobs=jobs; state.appointments=appointments; state.team=team; state.budgets=budgets; state.clients=clients; state.tasks=tasks; usingCachedData=false; }
  }
  await flushPendingSaves();
};

function fmtDate(d){
  if(!d) return '—';
  const [y,m,day] = d.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${day} ${months[parseInt(m,10)-1]}`;
}
function fmtFullDate(d){
  const dateStr = d || todayStr();
  const [y,m,day] = dateStr.split('-');
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `Querétaro, Qro. a ${parseInt(day,10)} de ${months[parseInt(m,10)-1]} de ${y}`;
}
function todayStr(){
  const t = new Date(); return t.toISOString().slice(0,10);
}
function daysUntil(d){
  const today = new Date(todayStr()+'T00:00:00');
  const target = new Date(d+'T00:00:00');
  return Math.round((target-today)/86400000);
}
function apptBadge(d){
  const diff = daysUntil(d);
  if(diff < 0) return {label:'Pasada', bg:'#E9E4D8', fg:'#8A8272'};
  if(diff === 0) return {label:'Hoy', bg:'#F1DFD5', fg:'#A64B2A'};
  if(diff === 1) return {label:'Mañana', bg:'#F3E7D0', fg:'#8A5D18'};
  return {label:`En ${diff} días`, bg:'#DCE7EA', fg:'#2F5D73'};
}

function fmtMoney(n){
  return '$' + (Number(n)||0).toLocaleString('es-MX',{minimumFractionDigits:2, maximumFractionDigits:2});
}
function waLink(phone, message){
  const clean = (phone||'').replace(/[^\d+]/g,'');
  const text = encodeURIComponent(message);
  if(clean) return `https://wa.me/${clean.replace(/^\+/,'')}?text=${text}`;
  return `https://api.whatsapp.com/send?text=${text}`;
}
function gcalDate(date,time){
  const [y,m,d] = date.split('-');
  if(time){
    const [hh,mm] = time.split(':');
    return `${y}${m}${d}T${hh}${mm}00`;
  }
  return `${y}${m}${d}`;
}
function googleCalendarLink(a){
  const job = state.jobs.find(j=>j.id===a.jobId);
  const start = gcalDate(a.date, a.time);
  let end;
  if(a.time){
    let [hh,mm] = a.time.split(':').map(Number);
    let endH = hh+1; if(endH>23) endH=23;
    end = gcalDate(a.date, `${endH.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}`);
  }else{
    end = start;
  }
  const details = [
    a.client?`Cliente: ${a.client}`:'',
    a.phone?`Teléfono: ${a.phone}`:'',
    job?`Proyecto: ${job.title}`:'',
    a.notes||''
  ].filter(Boolean).join('\n');
  const params = new URLSearchParams({
    action:'TEMPLATE',
    text:`GABA HOME – ${a.title}`,
    dates:`${start}/${end}`,
    details,
    location:a.location||''
  });
  return `https://calendar.google.com/calendar/render?${params.toString()}`;
}

function itemAmount(it){
  if(it.qty!=null && it.unitPrice!=null && it.qty!=='' && it.unitPrice!==''){
    return (Number(it.qty)||0) * (Number(it.unitPrice)||0);
  }
  return Number(it.amount)||0;
}
function budgetTotal(b){
  const sub = (b.items||[]).reduce((s,it)=>s+itemAmount(it),0);
  const iva = b.iva ? sub*0.16 : 0;
  const total = sub+iva;
  const paid = (b.payments||[]).reduce((s,p)=>s+(Number(p.amount)||0),0);
  const anticipos = (b.payments||[]).filter(p=>p.type==='anticipo');
  const totalAnticipos = anticipos.reduce((s,p)=>s+(Number(p.amount)||0),0);
  return {sub, iva, total, paid, balance: total-paid, anticipos, totalAnticipos};
}

      results.push({kind:'Presupuesto', label:b.title, sub:b.client||'', action:`ghSetView('budgets')`});
    }
  });
  return results.slice(0,20);
}

function escapeICS(s){ return (s||'').toString().replace(/\\/g,'\\\\').replace(/,/g,'\\,').replace(/;/g,'\\;').replace(/\n/g,'\\n'); }
function padICS(n){ return n.toString().padStart(2,'0'); }
function vEventBlock(a){
  const uidStr = `${a.id}@gabahome`;
  let dtstartLine, dtendLine;
  if(a.time){
    const [y,m,d] = a.date.split('-');
    const [hh,mm] = a.time.split(':');
    dtstartLine = `DTSTART:${y}${m}${d}T${hh}${mm}00`;
    let endH = parseInt(hh,10)+1; if(endH>23) endH=23;
    dtendLine = `DTEND:${y}${m}${d}T${padICS(endH)}${mm}00`;
  }else{
    const [y,m,d] = a.date.split('-');
    dtstartLine = `DTSTART;VALUE=DATE:${y}${m}${d}`;
    dtendLine = `DTEND;VALUE=DATE:${y}${m}${d}`;
  }
  const triggerMap = {sameday:'-PT2H', '1day':'-P1D', '2day':'-P2D'};
  let alarm = '';
  if(a.reminder && triggerMap[a.reminder]){
    alarm = `BEGIN:VALARM\r\nTRIGGER:${triggerMap[a.reminder]}\r\nACTION:DISPLAY\r\nDESCRIPTION:Recordatorio: ${escapeICS(a.title)}\r\nEND:VALARM\r\n`;
  }
  const desc = [a.client?`Cliente: ${a.client}`:'', a.notes||''].filter(Boolean).join('\\n');
  return [
    'BEGIN:VEVENT',
    `UID:${uidStr}`,
    dtstartLine, dtendLine,
    `SUMMARY:${escapeICS(a.title)}`,
    a.location?`LOCATION:${escapeICS(a.location)}`:'',
    desc?`DESCRIPTION:${escapeICS(desc)}`:'',
    alarm.trim(),
    'END:VEVENT'
  ].filter(Boolean).join('\r\n');
}
function apptToICS(a){
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//GABA HOME//Citas//ES','CALSCALE:GREGORIAN', vEventBlock(a), 'END:VCALENDAR'].join('\r\n');
}
function allApptsICS(list){
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//GABA HOME//Citas//ES','CALSCALE:GREGORIAN', ...list.map(vEventBlock), 'END:VCALENDAR'].join('\r\n');
}
function downloadICS(filename, content){
  const blob = new Blob([content], {type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url; link.download = filename;
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function parseQuickApptText(text){
  const t = (text||'').toLowerCase();
  const today = new Date(todayStr()+'T00:00:00');
  let date = null, time = null;

  // fecha dd/mm o dd-mm
  const dm = t.match(/\b(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?\b/);
  if(dm){
    const day = parseInt(dm[1],10), month = parseInt(dm[2],10);
    let year = dm[3] ? parseInt(dm[3],10) : today.getFullYear();
    if(year<100) year += 2000;
    if(day>=1&&day<=31&&month>=1&&month<=12){
      date = `${year}-${month.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;
    }
  }
  if(!date){
    if(/\bhoy\b/.test(t)) date = todayStr();
    else if(/\bma[ñn]ana\b/.test(t)){
      const d = new Date(today); d.setDate(d.getDate()+1);
      date = d.toISOString().slice(0,10);
    }else{
      const days = ['domingo','lunes','martes','miércoles','miercoles','jueves','viernes','sábado','sabado'];
      const dayIndexMap = {domingo:0,lunes:1,martes:2,'miércoles':3,miercoles:3,jueves:4,viernes:5,'sábado':6,sabado:6};
      for(const dname of days){
        if(t.includes(dname)){
          const target = dayIndexMap[dname];
          const d = new Date(today);
          let diff = (target - d.getDay() + 7) % 7;
          if(diff===0) diff = 7;
          d.setDate(d.getDate()+diff);
          date = d.toISOString().slice(0,10);
          break;
        }
      }
    }
  }

  // hora hh:mm o "a las X" o "Xpm/am"
  const hm = t.match(/\b(\d{1,2}):(\d{2})\s*(am|pm|hrs?)?\b/);
  const hOnly = t.match(/\b(?:a las\s*)?(\d{1,2})\s*(am|pm)\b/);
  if(hm){
    let hh = parseInt(hm[1],10); const mm = hm[2]; const ampm = hm[3];
    if(ampm==='pm' && hh<12) hh += 12;
    if(ampm==='am' && hh===12) hh = 0;
    time = `${hh.toString().padStart(2,'0')}:${mm}`;
  }else if(hOnly){
    let hh = parseInt(hOnly[1],10); const ampm = hOnly[2];
    if(ampm==='pm' && hh<12) hh += 12;
    if(ampm==='am' && hh===12) hh = 0;
    time = `${hh.toString().padStart(2,'0')}:00`;
  }

  return {date, time};
}

function viewTasks(){

  });

function taskRow(t){
  const member = state.team.find(m=>m.id===t.assignedTo);
  const job = state.jobs.find(j=>j.id===t.jobId);
  return `
  <div class="gh-task-row ${t.done?'done':''}">
    <input type="checkbox" class="gh-checkbox" ${t.done?'checked':''} onchange="ghToggleTask('${t.id}')">
    <div style="flex:1;">
      <div class="gh-task-title ${t.done?'done':''}">${escapeHtml(t.title)}</div>
      <div class="gh-task-meta">${member?escapeHtml(member.apodo||member.name):'Sin asignar'}${t.dueDate?` · Vence: ${fmtDate(t.dueDate)}`:''}${job?` · ${escapeHtml(job.title)}${job.folio?` <span class="gh-folio">(${job.folio})</span>`:''}`:''}</div>
    </div>
    <button class="gh-btn ghost small" onclick="ghDeleteTask('${t.id}')">${iconTrash()}</button>
  </div>`;
}

function viewReports(){
  const months = {};
  state.budgets.forEach(b=>{
    const key = new Date(b.createdAt||Date.now()).toISOString().slice(0,7);
    months[key] = months[key] || {presupuestado:0, cobrado:0};
    months[key].presupuestado += budgetTotal(b).total;
  });
  state.budgets.forEach(b=>{
    (b.payments||[]).forEach(p=>{
      const key = (p.date||'').slice(0,7);
      months[key] = months[key] || {presupuestado:0, cobrado:0};
      months[key].cobrado += Number(p.amount)||0;
    });
  });
  const monthKeys = Object.keys(months).sort().reverse();
  const monthNames = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const fmtMonth = k=>{ const [y,m]=k.split('-'); return `${monthNames[parseInt(m,10)-1]} ${y}`; };

  const byType = {};
  TYPES.forEach(t=>byType[t.id]={count:0, total:0});
  state.jobs.forEach(j=>{ if(byType[j.type]) byType[j.type].count++; });
  state.budgets.forEach(b=>{
    const job = state.jobs.find(j=>j.id===b.jobId);
    const type = job ? job.type : null;
    if(type && byType[type]) byType[type].total += budgetTotal(b).total;
  });

  const totalPresupuestado = state.budgets.reduce((s,b)=>s+budgetTotal(b).total,0);
  const totalCobrado = state.budgets.reduce((s,b)=>s+budgetTotal(b).paid,0);

  return `
  <div class="gh-topbar">
    <div><h1 class="gh-title">Reportes</h1><div class="gh-subtitle">Ingresos y desempeño</div></div>
  </div>

  <div class="gh-stats" style="grid-template-columns:repeat(3,1fr);">
    <div class="gh-stat"><div class="gh-stat-num">${fmtMoney(totalPresupuestado)}</div><div class="gh-stat-label">Total presupuestado</div></div>
    <div class="gh-stat"><div class="gh-stat-num">${fmtMoney(totalCobrado)}</div><div class="gh-stat-label">Total cobrado</div></div>
    <div class="gh-stat"><div class="gh-stat-num">${fmtMoney(totalPresupuestado-totalCobrado)}</div><div class="gh-stat-label">Por cobrar</div></div>
  </div>

  <div class="gh-section">
    <div class="gh-section-title" style="margin-bottom:10px;">Por mes</div>
    <div class="gh-job">
      ${monthKeys.length===0 ? emptyState('Aún no hay datos suficientes.') : monthKeys.map(k=>`
        <div class="gh-report-row">
          <span style="text-transform:capitalize;">${fmtMonth(k)}</span>
          <span style="font-family:'IBM Plex Mono',monospace;">Presupuestado: ${fmtMoney(months[k].presupuestado)} · Cobrado: ${fmtMoney(months[k].cobrado)}</span>
        </div>`).join('')}
    </div>
  </div>

  <div class="gh-section">
    <div class="gh-section-title" style="margin-bottom:10px;">Por tipo de trabajo</div>
    <div class="gh-job">
      ${TYPES.map(t=>`
        <div class="gh-report-row">
          <span>${t.label}</span>
          <span style="font-family:'IBM Plex Mono',monospace;">${byType[t.id].count} trabajo(s) · ${fmtMoney(byType[t.id].total)}</span>
        </div>`).join('')}
    </div>
  </div>
  `;
}

function viewBudgets(){

  return `

function budgetCard(b){
  const t = budgetTotal(b);
  const sc = BUDGET_STATUS_COLOR[b.status] || BUDGET_STATUS_COLOR.borrador;
  const pc = PAYMENT_STATUS_COLOR[b.paymentStatus] || PAYMENT_STATUS_COLOR.pendiente;
  const job = state.jobs.find(j=>j.id===b.jobId);
  return `
  <div class="gh-budget-card">
    <div class="gh-job-top">
      <div>
        <div class="gh-job-title">${escapeHtml(b.title)}</div>
        <div class="gh-job-meta">${BUDGET_TYPES[b.budgetType]?`${BUDGET_TYPES[b.budgetType].label} · `:''}${escapeHtml(b.client||'Sin cliente')}${job?` · ${escapeHtml(job.title)}`:''}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;">
        <span class="gh-budget-status" style="background:${sc.bg};color:${sc.fg}">${BUDGET_STATUS[b.status]||'Borrador'}${b.status==='aprobado'&&b.approvedAt?` · ${fmtDate(b.approvedAt)}`:''}</span>
        <span class="gh-budget-status" style="background:${pc.bg};color:${pc.fg}">${PAYMENT_STATUS[b.paymentStatus]||'Pendiente de pago'}</span>
      </div>
    </div>
    <div style="margin-top:4px;">
      ${(b.items||[]).map(it=>`<div style="display:flex;justify-content:space-between;font-size:calc(12.5px * var(--fs-mult,1));color:var(--ink-soft);padding:3px 0;"><span>${escapeHtml(it.concept)}${it.unit?` <span style="opacity:.7;">(${it.qty||1} ${escapeHtml(it.unit)} × ${fmtMoney(it.unitPrice||0)})</span>`:''}</span><span style="font-family:'IBM Plex Mono',monospace">${fmtMoney(itemAmount(it))}</span></div>`).join('')}
    </div>
    ${b.iva?`<div style="display:flex;justify-content:space-between;font-size:calc(12px * var(--fs-mult,1));color:var(--ink-soft);padding:4px 0;border-top:1px dashed var(--border);margin-top:4px;"><span>Subtotal (sin IVA)</span><span>${fmtMoney(t.sub)}</span></div><div style="display:flex;justify-content:space-between;font-size:calc(12px * var(--fs-mult,1));color:var(--ink-soft);padding:2px 0;"><span>IVA (16%)</span><span>${fmtMoney(t.iva)}</span></div>`:''}
    <div class="gh-budget-total"><span class="label">Total${b.iva?' (con IVA)':''}</span><span class="value">${fmtMoney(t.total)}</span></div>
    ${!b.iva?`<div style="font-size:calc(11px * var(--fs-mult,1));color:var(--ink-soft);margin-top:2px;">No incluye IVA</div>`:''}
    ${(b.payments&&b.payments.length)?`
    <div style="margin-top:6px;">
      ${b.payments.map(p=>`<div class="gh-payment-row"><span>${p.type==='anticipo'?'Anticipo':'Pago'} · ${fmtDate(p.date)}</span><span style="display:flex;align-items:center;gap:6px;">${fmtMoney(p.amount)} <button class="gh-item-remove" onclick="ghDeletePayment('${b.id}','${p.id}')" title="Eliminar pago">×</button></span></div>`).join('')}
    </div>`:''}
    ${t.anticipos.length ? `<div style="font-size:calc(11.5px * var(--fs-mult,1));color:var(--ochre);background:var(--ochre-soft);border-radius:6px;padding:5px 9px;margin-top:6px;">💵 ${t.anticipos.length} anticipo${t.anticipos.length>1?'s':''} recibido${t.anticipos.length>1?'s':''}: ${fmtMoney(t.totalAnticipos)}</div>` : `<div style="font-size:calc(11.5px * var(--fs-mult,1));color:var(--ink-soft);margin-top:6px;">Sin anticipo registrado</div>`}
    <div class="gh-paid-line">
      <span>Pagado: ${fmtMoney(t.paid)}</span>
      <span style="font-weight:700;color:${t.balance>0?'var(--brick)':'var(--moss)'}">Saldo: ${fmtMoney(t.balance)}</span>
    </div>
    ${(t.balance>0 && state.settings.accountNumber)?`<div style="font-size:calc(11px * var(--fs-mult,1));color:var(--ink-soft);background:var(--blue-soft);border-radius:6px;padding:6px 9px;margin-top:6px;">🏦 Transferir a: ${escapeHtml(state.settings.bankName||'')} ${escapeHtml(state.settings.accountNumber||'')}${state.settings.clabe?` · CLABE ${escapeHtml(state.settings.clabe)}`:''}</div>`:''}
    <div class="gh-job-foot" style="margin-top:8px;">
      <button class="gh-btn secondary small" onclick="ghOpenNewPayment('${b.id}')">${iconPlus()} Registrar pago</button>
      <div class="gh-job-actions">
        <button class="gh-btn ghost small" onclick="ghPrintBudget('${b.id}')" title="Descargar PDF">🖨️ PDF</button>
        <button class="gh-wa-btn" onclick="ghSendBudgetWhatsapp('${b.id}')">${iconWhatsapp()} WhatsApp</button>
        <button class="gh-btn ghost small" onclick="ghEditBudget('${b.id}')">${iconEdit()}</button>
        <button class="gh-btn ghost small" onclick="ghDeleteBudget('${b.id}')">${iconTrash()}</button>
      </div>
    </div>
  </div>`;
}

      ${j.location?`<div><strong>Ubicación:</strong> <a class="gh-maps-link" href="${mapsLink(j.location)}" target="_blank" rel="noopener">📍 ${escapeHtml(j.location)}</a></div>`:''}

/* ---------------- UTILS ---------------- */
function escapeHtml(s){ return (s??'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s){ return escapeHtml(s); }

/* ---------------- ACTIONS (exposed globally) ---------------- */
window.ghSetView = function(v){ state.view=v; state.filterType='todos'; state.filterStatus='todos'; render(); };
window.ghSearch = function(value){
  state.searchQuery = value;
  render();
  const el = document.getElementById('gh-search-box');
  if(el){ el.focus(); const pos = value.length; try{ el.setSelectionRange(pos,pos); }catch(e){} }
};
window.ghClearSearchAnd = function(fn){ state.searchQuery=''; fn(); };
window.ghFilter = function(kind, val){ if(kind==='type') state.filterType=val; else state.filterStatus=val; render(); };

window.ghOpenNewJob = function(){ state.modal='job'; state.editingId=null; state.draft={type:'avaluo', status:'en_presupuesto', progress:0, priority:'media', acceptance:'en_proceso', folio:nextFolio()}; render(); };
window.ghEditJob = function(id){ const j = state.jobs.find(x=>x.id===id); state.modal='job'; state.editingId=id; state.draft={...j}; render(); };
window.ghDeleteJob = async function(id){ state.jobs = state.jobs.filter(j=>j.id!==id); render(); await saveKey('jobs', state.jobs); };
window.ghSaveJob = async function(){
  const draft = {
    title: document.getElementById('f-title').value.trim() || 'Sin título',
    client: document.getElementById('f-client').value.trim(),
    folio: document.getElementById('f-folio').value.trim(),
    type: document.getElementById('f-type').value,
    customType: document.getElementById('f-customtype').value.trim(),
    tramitologia: document.getElementById('f-tramitologia').value,
    acceptance: document.getElementById('f-acceptance').value,
    assignedTo: Array.from(document.querySelectorAll('.job-assigned-cb:checked')).map(el=>el.value),
    status: document.getElementById('f-status').value,
    startDate: document.getElementById('f-start').value,
    dueDate: document.getElementById('f-due').value,
    priority: document.getElementById('f-priority').value,
    location: document.getElementById('f-location').value.trim(),
    progress: parseInt(document.getElementById('f-progress').value,10),
    hasTramitologia: document.getElementById('f-has-tramitologia').checked,
    progressTramitologia: parseInt(document.getElementById('f-progress-tramite').value,10),
    progressPresupuesto: parseInt(document.getElementById('f-progress-presu').value,10),
    customProgressLabel: document.getElementById('f-progress-custom-label').value.trim(),
    customProgressValue: parseInt(document.getElementById('f-progress-custom').value,10),
    pendingReason: document.getElementById('f-pendingreason').value.trim(),
    notes: document.getElementById('f-notes').value.trim()
  };
  if(state.editingId){
    const prev = state.jobs.find(j=>j.id===state.editingId);
    const logs = [];
    if(prev && prev.status!==draft.status) logs.push(`Estado cambió de "${STATUS[prev.status]}" a "${STATUS[draft.status]}"`);
    if(prev && Number(prev.progress)!==Number(draft.progress)) logs.push(`Avance actualizado a ${draft.progress}%`);
    state.jobs = state.jobs.map(j=>j.id===state.editingId?{...j,...draft}:j);
    state.modal=null; render();
    for(const l of logs){ await addJobLog(state.editingId, l); }
  }else{
    const checklist = (CHECKLIST_TEMPLATES[draft.type]||[]).map(label=>({id:uid(), label, done:false}));
    if(!draft.folio) draft.folio = nextFolio();
    const newJob = {id:uid(), createdAt:Date.now(), checklist, log:[{id:uid(), ts:Date.now(), text:'Trabajo creado'}], ...draft};
    state.jobs.push(newJob);
    state.modal=null; render();
  }
  await saveKey('jobs', state.jobs);
};

window.ghAskOvo = function(question){
  let answer = '';
  if(question==='atrasados'){
    const overdueJobs = state.jobs.filter(j=>isOverdue(j));
    answer = overdueJobs.length
      ? `🦉 Atrasados: ${overdueJobs.map(j=>escapeHtml(j.title)+(j.dueDate?` (venció ${fmtDate(j.dueDate)})`:'')).join(', ')}.`
      : `🦉 No tienes ningún proyecto atrasado ahorita. 👍`;
  }else if(question==='cobrar'){
    const unpaid = state.budgets.filter(b=>budgetTotal(b).balance>0 && (b.status==='aprobado'||b.status==='enviado'));
    const total = unpaid.reduce((s,b)=>s+budgetTotal(b).balance,0);
    answer = unpaid.length
      ? `🦉 Te deben ${fmtMoney(total)} en total, de: ${unpaid.map(b=>`${escapeHtml(b.title)} (${fmtMoney(budgetTotal(b).balance)})`).join(', ')}.`
      : `🦉 No tienes saldos pendientes por cobrar. 🎉`;
  }else if(question==='semana'){
    const weekAppts = state.appointments.filter(a=>daysUntil(a.date)>=0 && daysUntil(a.date)<=7).sort((a,b)=>a.date.localeCompare(b.date));
    answer = weekAppts.length
      ? `🦉 Esta semana tienes: ${weekAppts.map(a=>`${escapeHtml(a.title)} (${fmtDate(a.date)}${a.time?` ${a.time}`:''})`).join(', ')}.`
      : `🦉 No tienes citas registradas para los próximos 7 días.`;
  }
  state.ovoAnswer = answer;
  render();
};

  const hasItems = (state.draft.items||[]).some(it=>it.concept);

  if(totEl) totEl.textContent = fmtMoney(t.total);
};

window.ghSaveBudget = async function(){
  syncBudgetFormToDraft();
  const d = state.draft;
  const draft = {
    title: (d.title||'').trim() || 'Sin título',
    client: (d.client||'').trim(),
    phone: (d.phone||'').trim(),
    jobId: d.jobId||'',
    status: d.status||'borrador',
    budgetType: d.budgetType||'libre',
    paymentStatus: document.getElementById('f-paymentstatus') ? document.getElementById('f-paymentstatus').value : (d.paymentStatus||'pendiente'),
    iva: !!d.iva,
    items: (d.items||[]).filter(it=>it.concept || it.unitPrice || it.amount).map(it=>({
      concept:(it.concept||'').trim()||'Concepto',
      unit: it.unit||'SERVICIO',
      qty: it.qty!=null && it.qty!=='' ? Number(it.qty) : 1,
      unitPrice: Number(it.unitPrice!=null && it.unitPrice!=='' ? it.unitPrice : it.amount)||0
    }))
  };
  const isNew = !state.editingId;
  if(state.editingId){
    const prev = state.budgets.find(b=>b.id===state.editingId);
    if(draft.status==='aprobado' && prev && prev.status!=='aprobado') draft.approvedAt = todayStr();
    state.budgets = state.budgets.map(b=>b.id===state.editingId?{...b,...draft}:b);
  }else{
    if(draft.status==='aprobado') draft.approvedAt = todayStr();
    state.budgets.push({id:uid(), createdAt:Date.now(), payments:[], ...draft});
  }
  state.modal=null; render();
  await saveKey('budgets', state.budgets);
  if(isNew && draft.jobId){
    const total = budgetTotal(draft).total;
    await addJobLog(draft.jobId, `Presupuesto agregado: ${draft.title} por ${fmtMoney(total)}`);
  }
};

window.ghSendJobExpedienteWhatsapp = function(id){
  const j = state.jobs.find(x=>x.id===id);
  if(!j) return;
  const relBudgets = state.budgets.filter(b=>b.jobId===j.id);
  const relAppts = state.appointments.filter(a=>a.jobId===j.id && daysUntil(a.date)>=0).sort((a,b)=>a.date.localeCompare(b.date));
  const total = relBudgets.reduce((s,b)=>s+budgetTotal(b).total,0);
  let msg = `📁 Expediente GABA Home\n\n`;
  msg += `*${j.title}*\n`;
  if(j.folio) msg += `Núm. de expediente: ${j.folio}\n`;
  msg += `Cliente: ${j.client||'—'}\n`;
  msg += `Tipo: ${typeLabel(j)}\n`;
  msg += `Estado: ${STATUS[j.status]} · Avance: ${j.progress||0}%\n`;
  if(j.dueDate) msg += `Entrega: ${fmtDate(j.dueDate)}\n`;
  if(j.status!=='terminado' && j.pendingReason) msg += `⏳ Por qué no está terminado: ${j.pendingReason}\n`;
  if(relBudgets.length) msg += `\n💰 Presupuesto total: ${fmtMoney(total)}\n`;
  if(relAppts.length) msg += `\n📅 Próxima cita: ${fmtDate(relAppts[0].date)}${relAppts[0].time?` ${relAppts[0].time} hrs`:''}\n`;
  window.open(waLink(j.clientPhone || (relAppts[0]&&relAppts[0].phone) || '', msg), '_blank');
};
